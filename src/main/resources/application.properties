spring.application.name=backend
server.port=8080

# H2 Database Configuration (for local testing)
spring.datasource.url=jdbc:h2:mem:resumedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# Spring AI Configuration using Gemini OpenAI-compatible endpoint
spring.ai.openai.api-key=${SPRING_AI_OPENAI_API_KEY}
spring.ai.openai.base-url=https://generativelanguage.googleapis.com/v1beta/openai/
spring.ai.openai.chat.options.model=gemini-2.5-flash
spring.ai.retry.max-attempts=1
spring.ai.openai.chat.options.temperature=0.3
